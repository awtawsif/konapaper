# KONAPAPER(5)              Konapaper User Manual             KONAPAPER(5)
#
# NAME
#        konapaper.conf - configuration file for konapaper.sh
#
# SYNOPSIS
#        ~/.config/konapaper/konapaper.conf
#
# DESCRIPTION
#        This file contains the default configuration for the Konapaper wallpaper
#        rotator script. It follows a simple Bash variable assignment syntax.
#        The script searches for this file in the following order:
#
#        1. ~/.config/konapaper/konapaper.conf
#        2. The directory where the script is located.
#        3. The current working directory (./konapaper.conf).
#
#        All variables defined here can be overridden by their respective 
#        command-line flags when running konapaper.sh.
#
# ==============================================================================
# SEARCH PARAMETERS
# ==============================================================================

# TAGS
#        A space-separated list of Moebooru tags to filter the search results.
#        Tags can include character names, artists, series, or general descriptors.
#        Example: TAGS="touhou scenic"
#        Default: ""
# TAGS=""

# LIMIT
#        The number of posts to retrieve from the API for each query.
#        A higher number increases the variety of the random selection but may 
#        slightly increase API response time.
#        Default: 50
# LIMIT=50

# RATING
#        Filter posts by their content rating.
#        Available options:
#            "s" - Safe (recommended for most users)
#            "q" - Questionable
#            "e" - Explicit
#        Default: "s"
# RATING="s"

# ORDER
#        The sorting order of the retrieved posts.
#        Available options:
#            "random" - Random selection (best for variety)
#            "score"  - Highest score first
#            "date"   - Most recent first
#        Default: "random"
# ORDER="random"

# PAGE
#        The page number to query from the API.
#        Can be a fixed number (e.g., 1), the string "random", or a range 
#        in the format "MIN-MAX" (e.g., "1-50").
#        Default: 1
# PAGE=1

# ==============================================================================
# ADVANCED FILTERING
# ==============================================================================

# MAX_FILE_SIZE
#        The maximum allowed file size for a wallpaper.
#        Use formats like "500KB", "2MB", "1GB". Set to "0" to disable.
#        Default: "2MB"
# MAX_FILE_SIZE="2MB"

# MIN_FILE_SIZE
#        The minimum allowed file size for a wallpaper.
#        Helps filter out thumbnails or low-quality images.
#        Default: "0" (disabled)
# MIN_FILE_SIZE="0"

# MIN_SCORE
#        Only download images with a score greater than or equal to this value.
#        Useful for ensuring a minimum quality level based on user votes.
#        Default: "" (disabled)
# MIN_SCORE=""

# ARTIST
#        Filter posts by a specific artist or uploader.
#        Example: ARTIST="k-eke"
#        Default: "" (disabled)
# ARTIST=""

# POOL_ID
#        Download from a specific pool (collection) instead of searching by tags.
#        Setting this ignores TAGS, RATING, and ORDER.
#        Default: "" (disabled)
# POOL_ID=""

# ==============================================================================
# RESOLUTION AND ASPECT RATIO
# ==============================================================================

# MIN_WIDTH / MAX_WIDTH
#        Horizontal resolution constraints in pixels.
#        Default: "" (disabled)
# MIN_WIDTH=""
# MAX_WIDTH=""

# MIN_HEIGHT / MAX_HEIGHT
#        Vertical resolution constraints in pixels.
#        Default: "" (disabled)
# MIN_HEIGHT=""
# MAX_HEIGHT=""

# ASPECT_RATIO
#        Filter by visual proportions.
#        Supported formats: "16:9", "21:9", "4:3", "16:10", etc.
#        Default: "" (disabled)
# ASPECT_RATIO=""

# ==============================================================================
# ANIMATED CONTENT
# ==============================================================================

# PREFERRED_FORMAT
#        The desired file format for wallpapers.
#        Available options:
#            "jpg"  - Static images
#            "gif"  - Animated GIF files
#            "webm" - Video wallpapers (requires compatible setter like mpvpaper)
#        Default: "jpg"
# PREFERRED_FORMAT="jpg"

# ANIMATED_ONLY
#        When set to true, the script ignores generic tags and searches 
#        specifically for animated content (GIF/WebM).
#        Default: "false"
# ANIMATED_ONLY="false"

# ==============================================================================
# RANDOM TAG FEATURE
# ==============================================================================

# RANDOM_TAGS_LIST
#        An array of tags from which a selection is randomly picked when 
#        running with the --random-tags flag.
#        Default: ("landscape" "scenic" "sky" "clouds" "water" "original" "touhou" "building")
RANDOM_TAGS_LIST=("landscape" "scenic" "sky" "clouds" "water" "original" "touhou" "building")

# RANDOM_TAGS_COUNT
#        The number of tags to pick from RANDOM_TAGS_LIST.
#        Set to 0 to disable this feature by default.
#        Default: 0
# RANDOM_TAGS_COUNT=0

# EXPORTED_TAGS_FILE
#        Path to a file where discovered tags are stored.
#        If it exists, this file overrides RANDOM_TAGS_LIST.
#        Default: ~/.config/konapaper/discovered_tags.txt
# EXPORTED_TAGS_FILE="$HOME/.config/konapaper/discovered_tags.txt"

# ==============================================================================
# CACHE AND PRELOADING
# ==============================================================================

# PRELOAD_COUNT
#        The number of wallpapers to download in the background for the 
#        next rotation.
#        Default: 3
# PRELOAD_COUNT=3

# MAX_PRELOAD_CACHE
#        The maximum number of wallpapers to retain in the preload directory.
#        Default: 10
# MAX_PRELOAD_CACHE=10

# DISCOVER_LIMIT
#        The number of items to fetch for discovery modes (tags/artists/pools).
#        Default: 20
# DISCOVER_LIMIT=20

# FAVORITES_DIR
#        The directory where wallpapers saved with --fav are stored.
#        Default: ~/Pictures/Wallpapers
# FAVORITES_DIR="$HOME/Pictures/Wallpapers"

# ==============================================================================
# NOTIFICATIONS
# ==============================================================================

# ENABLE_NOTIFICATIONS
#        Enable desktop notification toasts for wallpaper changes, errors,
#        and other events. Uses notify-send (freedesktop notifications).
#        Default: "false"
# ENABLE_NOTIFICATIONS="false"

# NOTIFY_TIMEOUT
#        Timeout for final/completion notification toasts in milliseconds.
#        Progress toasts have no timeout (stay until replaced).
#        Default: 5000 (5 seconds)
# NOTIFY_TIMEOUT=5000

# NOTIFY_PRELOAD
#        Enable notifications for background preload progress.
#        When disabled, preload runs silently.
#        Default: "false"
# NOTIFY_PRELOAD="false"

# ==============================================================================
# LOGGING
# ==============================================================================

# ENABLE_LOGGING
#        Enable execution logging for debugging purposes.
#        Default: "false"
# ENABLE_LOGGING="false"

# LOG_FILE
#        The path to the log file.
#        Default: ~/.config/konapaper/konapaper.log
# LOG_FILE="$HOME/.config/konapaper/konapaper.log"

# LOG_LEVEL
#        Detail level for log entries.
#        Options: "basic", "detailed", "verbose"
#        Default: "detailed"
# LOG_LEVEL="detailed"

# LOG_ROTATION
#        Automatically rotate log files when they exceed 10MB.
#        Default: "true"
# LOG_ROTATION="true"

# ==============================================================================
# DISPLAY SERVER AND COMMANDS
# ==============================================================================

# DISPLAY_SERVER
#        Override the auto-detected display server.
#        Options: "wayland", "x11"
#        Default: (auto-detected)
# DISPLAY_SERVER=""

# WALLPAPER_COMMAND
#        The custom command used to set the wallpaper.
#        The placeholder {IMAGE} is replaced with the absolute path to the 
#        downloaded image.
#        Example: WALLPAPER_COMMAND="feh --bg-fill {IMAGE}"
#        Default: (auto-detected based on available tools)
# WALLPAPER_COMMAND=""

# ==============================================================================
# PREVIEW OF TOOL-SPECIFIC COMMANDS
# ==============================================================================
# These are the default strings used for various tools when auto-detected.
# You can copy and modify these into WALLPAPER_COMMAND above.

# awww (Wayland):
WALLPAPER_COMMAND_AWWW="awww img {IMAGE} --transition-type any --transition-fps 60 --transition-duration 1"

# mpvpaper (Wayland/X11):
WALLPAPER_COMMAND_MPVPAPER="mpvpaper -f -o \"loop\" ALL {IMAGE}"

# swaybg (Wayland):
WALLPAPER_COMMAND_SWAYBG="pkill -f swaybg; swaybg -o '*' {IMAGE} &"

# hyprpaper (Wayland):
WALLPAPER_COMMAND_HYPRPAPER="hyprctl hyprpaper preload {IMAGE}; for monitor in \$(hyprctl monitors -j | jq -r '.[].name'); do hyprctl hyprpaper wallpaper \"\${monitor},{IMAGE}\"; done"

# feh (X11):
WALLPAPER_COMMAND_FEH="feh --bg-scale {IMAGE}"

# nitrogen (X11):
WALLPAPER_COMMAND_NITROGEN="nitrogen --set-scaled --save {IMAGE}"

# xwallpaper (X11):
WALLPAPER_COMMAND_XWALLPAPER="xwallpaper --zoom {IMAGE}"

# ==============================================================================
# EXAMPLES
# ==============================================================================
#
# 1. Ultra-wide setup with high score filtering:
#    TAGS="scenic"
#    MIN_SCORE=30
#    ASPECT_RATIO="21:9"
#    MIN_WIDTH=3440
#
# 2. Animated wallpaper enthusiast:
#    PREFERRED_FORMAT="gif"
#    ANIMATED_ONLY="true"
#    WALLPAPER_COMMAND="mpvpaper -f -o \"loop\" ALL {IMAGE}"
#
# ==============================================================================
# NOTES
# ==============================================================================
# - Changes to this file take effect on the next run of konapaper.sh.
# - Ensure all custom commands are installed and available in your PATH.
# - For more documentation, see README.md in the project root.
#
